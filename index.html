<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reselling Business</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1>💼 ResellBiz</h1>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#products">Produkter</a></li>
                <li><a href="#contact">Kontakt</a></li>
            </ul>
        </div>
    </nav>

    <section class="hero">
        <h1>Högkvalitativa Produkter</h1>
        <p>Till bästa priser på marknaden</p>
        <button class="cta-btn">Shoppa Nu</button>
    </section>

    <section class="products" id="products">
        <h2>Våra Produkter</h2>
        <div class="products-grid">
            <div class="product-card">
                <div class="product-image">📱</div>
                <h3>Premium Headphones</h3>
                <p class="price">399 kr</p>
                <button>Köp Nu</button>
            </div>
            <div class="product-card">
                <div class="product-image">⌚</div>
                <h3>Smart Watch</h3>
                <p class="price">599 kr</p>
                <button>Köp Nu</button>
            </div>
            <div class="product-card">
                <div class="product-image">💻</div>
                <h3>Wireless Mouse</h3>
                <p class="price">199 kr</p>
                <button>Köp Nu</button>
            </div>
        </div>
    </section>

    <section class="contact" id="contact">
        <h2>Kontakta Oss</h2>
        <p>📧 Email: info@resellingbiz.se</p>
        <p>📞 Tel: +46 8 123 45 67</p>
    </section>

    <footer>
        <p>&copy; 2026 Reselling Business</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
